<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body class="bg-[#F8FAFC] h-screen flex items-center justify-center">
    <fieldset
      class="fieldset bg-base-100 border-base-300 rounded-box border p-6 w-11/12 lg:w-1/3"
    >
      <div class="text-center my-4">
        <img
          src="./assets/github-logo.png"
          class="mx-auto mb-4"
          alt="GitHub Logo"
        />
        <h1 class="text-2xl font-semibold">GitHub Issues Tracker</h1>
        <p class="text-[#64748B text-base">Sign in to manage your issues</p>
      </div>

      <label class="label text-black font-medium text-sm">Username</label>
      <input
        id="username"
        type="text"
        class="input w-full rounded-lg"
        placeholder="Enter Username"
      />
      <p class="text-[#4A00FF] mb-2">Default: admin</p>

      <label class="label text-black font-medium text-sm">Password</label>
      <input
        id="password"
        type="password"
        class="input w-full rounded-lg"
        placeholder="Enter Password"
      />
      <p class="text-[#4A00FF]">Default: admin123</p>

      <button id="signin-btn" class="btn btn-primary rounded-lg mt-4">
        Sign in
      </button>

      <div class="flex items-center my-4">
        <hr class="flex-1 border-1 border-gray-300" />
        <p class="mx-2 text-[#1F2937]">OR</p>
        <hr class="flex-1 border-1 border-gray-300" />
      </div>

      <div class="text-center space-y-3">
        <p class="text-sm text-[#64748B]">Demo Credentials</p>
        <div class="text-base bg-[#F8FAFC] p-6 rounded-md">
          <p><span class="font-semibold">Username:</span> admin</p>
          <p><span class="font-semibold">Password:</span> admin123</p>
        </div>
      </div>
    </fieldset>

    <script src="./scripts/scripts.js"></script>
    <script src="./scripts/login.js"></script>
  </body>
</html>
