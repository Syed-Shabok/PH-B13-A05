<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body class="bg-[#F8FAFC] min-h-screen">
    <!-- Navbar -->
    <header class="mb-10">
      <div class="navbar bg-base-100 shadow-sm">
        <div
          class="flex flex-col md:flex-row items-center gap-3 w-11/12 mx-auto"
        >
          <div class="flex-1">
            <a class="btn btn-ghost text-lg md:text-xl">
              <div class="flex items-center justify-center gap-1">
                <img
                  src="./assets/github-logo.png"
                  class="w-6 md:w-8"
                  alt="GitHub Logo Icon"
                />
                GitHub Issues Tracker
              </div>
            </a>
          </div>
          <div class="flex gap-3">
            <label class="input">
              <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
              <input
                id="search-bar"
                type="search"
                class="grow"
                placeholder="Search Issues..."
              />
            </label>

            <button id="add-issue-btn" class="btn btn-primary">
              <i class="fa-solid fa-plus"></i>New Issue
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="space-y-5 pb-10">
      <!-- Toggle Buttons Section -->
      <section
        class="w-11/12 md:w-3/4 mx-auto p-5 rounded-lg space-x-2 bg-base-100 shadow-sm flex"
      >
        <button id="all-btn" class="btn btn-outline md:w-30">All</button>
        <button id="open-btn" class="btn btn-outline md:w-30">Open</button>
        <button id="closed-btn" class="btn btn-outline md:w-30">Closed</button>
      </section>

      <!-- Issues Section -->
      <section
        class="w-11/12 md:w-3/4 mx-auto rounded-lg space-x-1 bg-base-100 shadow-sm"
      >
        <!-- Part that displays no. of issues -->
        <div
          class="flex flex-col md:flex-row justify-between md:items-center p-5 gap-5"
        >
          <div class="flex items-center gap-2">
            <div class="bg-purple-100 p-2 rounded-full">
              <img src="./assets/Aperture.png" alt="Aperture Icon" />
            </div>
            <div>
              <h2 id="no-of-issues" class="text-lg font-semibold">50 Issues</h2>
              <p class="text-sm text-gray-500">
                Track and manage your project issues
              </p>
            </div>
          </div>

          <div class="flex ml-2 gap-4">
            <div class="flex items-center justify-center gap-2">
              <div class="p-[0.3rem] rounded-full bg-green-500"></div>
              <p class="text-base font-medium">Open</p>
            </div>
            <div class="flex items-center justify-center gap-2">
              <div class="p-[0.3rem] rounded-full bg-purple-500"></div>
              <p class="text-base font-medium">Closed</p>
            </div>
          </div>
        </div>

        <hr class="w-full border border-gray-200" />

        <!-- Part where Issue Cards are rendered -->
        <div class="p-5 grid grid-cols-4 gap-4 bg-[#FBFBFB]">
          <!-- Issue Card -->
          <div
            id="issue-card"
            class="rounded-md bg-base-100 shadow-md border-t-4 border-green-500"
          >
            <!-- Card Top Part-->
            <div class="p-5 border-b-1 border-gray-300 space-y-4">
              <!-- Status and Priority -->
              <div class="flex justify-between">
                <a href="">
                  <img
                    src="./assets/Open-Status.png"
                    class="status-icon"
                    alt="Open Status Icon"
                  />
                </a>

                <div
                  class="priority-badge badge badge-soft badge-error px-5 rounded-xl font-medium"
                >
                  High
                </div>
              </div>

              <!-- Title and Description -->
              <div class="space-y-1">
                <h2 class="issue-title font-semibold">
                  Fix navigation menu on mobile devices
                </h2>
                <p class="issue-description text-xs">
                  The navigation menu doesn't collapse properly on mobile
                  devices...
                </p>
              </div>

              <!-- Topic -->
              <div class="issue-topics">
                <div
                  class="badge badge-soft badge-error px-5 rounded-xl font-medium border-red-500"
                >
                  BUG
                </div>
                <div
                  class="badge badge-soft badge-warning px-5 rounded-xl font-medium border-yellow-500"
                >
                  HELP WANTED
                </div>
              </div>
            </div>

            <!-- Card Bottom Part -->
            <div class="p-5 text-sm text-gray-500 space-y-1">
              <p class="issue-author">#1 by john_doe</p>
              <p class="issue-date">1/15/2024</p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="./scripts/scripts.js"></script>
  </body>
</html>
